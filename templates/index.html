<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Housing Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #000000, #1a2a3a); /* Black and dark blue gradient */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #ecf0f1; /* Light font color for contrast */
        }
        .container {
            margin-top: 50px;
            background: rgba(44, 62, 80, 0.7); /* Semi-transparent dark background for Glassmorphism */
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); /* Darker shadow */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); /* Subtle border */
            color: #ecf0f1; /* Light font color for contrast */
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: #ecf0f1; /* Light title color */
            margin-bottom: 30px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }
        .form-label {
            font-weight: bold;
            color: #ecf0f1;
        }
        .form-control {
            background-color: rgba(255, 255, 255, 0.1); /* Semi-transparent input fields */
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ecf0f1;
        }
        .form-control::placeholder {
            color: rgba(236, 240, 241, 0.7);
        }
        .form-control:focus {
            background-color: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: none;
            color: #ecf0f1;
        }
        .btn-primary {
            background-color: #27ae60; /* Slightly darker green submit button */
            border-color: #27ae60;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #229954;
            border-color: #1e8449;
        }
        .prediction-result {
            text-align: center;
            margin-top: 30px;
            padding: 15px;
            background-color: rgba(39, 174, 96, 0.7); /* Semi-transparent green for result */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ecf0f1; /* Light text */
            font-size: 1.1em;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Predict House Price</h1>
        <form action="/predict" method="post">
            <div class="mb-3">
                <label for="area" class="form-label">Area (sq ft):</label>
                <input type="number" class="form-control" id="area" name="area" min="0" required>
            </div>

            <div class="mb-3">
                <label for="bedrooms" class="form-label">Bedrooms:</label>
                <input type="number" class="form-control" id="bedrooms" name="bedrooms" required>
            </div>

            <div class="mb-3">
                <label for="bathrooms" class="form-label">Bathrooms:</label>
                <input type="number" class="form-control" id="bathrooms" name="bathrooms" required>
            </div>

            <div class="mb-3">
                <label for="stories" class="form-label">Stories:</label>
                <input type="number" class="form-control" id="stories" name="stories" required>
            </div>

            <div class="mb-3">
                <label for="parking" class="form-label">Parking (0-3):</label>
                <input type="number" class="form-control" id="parking" name="parking" min="0" max="3" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Predict</button>
        </form>
        {% if prediction_text %}
            <div class="prediction-result">{{ prediction_text }}</div>
        {% endif %}
    </div>
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
